name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into module.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Install and build
        run: |
          npm ci
          npm run check
          npm run build

      - name: Build release zip
        run: |
          zip -r pf2e-module-template.zip \
            module.json LICENSE README.md dist lang packs assets \
            -x "packs/_source/*" \
            -x "packs/*/LOCK" -x "packs/*/LOG" -x "packs/*/LOG.old" -x "packs/*/*.log" \
            -x "*/.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pf2e-module-template.zip
            module.json
          generate_release_notes: true
